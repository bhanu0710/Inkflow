name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Codebase
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_ENV: test
      BACKEND_HOST: localhost
      BACKEND_PORT: 3000
      BACKEND_CORS_ORIGIN: http://localhost:5173
      GRACEFUL_SHUTDOWN_TIMEOUT_MS: 10000
      DATABASE_URL: postgresql://inkflow:inkflow_password@localhost:5432/inkflow?schema=public
      REDIS_URL: redis://localhost:6379
      LOG_LEVEL: silent
      SWAGGER_TITLE: InkFlow API
      SWAGGER_VERSION: 0.1.0
      JWT_ACCESS_SECRET: supersecretjwtkeythatisextremelylongandsecuretoavoidattacks
      JWT_ACCESS_TOKEN_TTL_MINUTES: 15
      REFRESH_TOKEN_TTL_DAYS: 30
      BCRYPT_COST: 4

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate -w apps/backend

      - name: Run Linting
        run: npm run lint

      - name: Run Build
        run: npm run build
      - name: Debug Environment
        run: |
         echo "===== CI Environment ====="
         env | sort | grep -E 'BACKEND|DATABASE|REDIS|JWT|LOG_LEVEL|SWAGGER|BCRYPT|REFRESH|SERVICE|NODE_ENV'

      - name: Run Tests
        run: npm run test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          load: true
          tags: inkflow-backend:ci
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max 

      - name: Build Frontend Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          load: true
          tags: inkflow-frontend:ci
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Backend Image (High & Critical)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: 'inkflow-backend:ci'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'

      - name: Enforce Backend Security (Fail on Critical)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: 'inkflow-backend:ci'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: Scan Frontend Image (High & Critical)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: 'inkflow-frontend:ci'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'

      - name: Enforce Frontend Security (Fail on Critical)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: 'inkflow-frontend:ci'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'
